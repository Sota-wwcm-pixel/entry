<!DOCTYPE html>
<html lang="ja">
<head>
  <!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>エントリー受付</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f0f0f0; }
    
  /* 修正箇所：アプリ全体の高さを画面の高さに合わせる */
.app { 
  max-width: 390px; 
  margin: 0 auto; 
  background: #fff; 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
  position: relative; 
  min-height: 100vh; /* 780px固定から、デバイスの高さに合わせる */
  display: flex;
  flex-direction: column;
}

/* 修正箇所：各画面が高さ目一杯に広がるようにする */
.screen { 
  display: none; 
  flex-direction: column; 
  flex-grow: 1; /* 残りのスペースを埋める */
  background: #fff; 
}

/* 追加：ボタンのタップ反応時のハイライトを抑える */
button, .ticket-check-item {
  -webkit-tap-highlight-color: transparent;
}
    .screen.active { display: flex; }

    .nav { display: flex; align-items: center; padding: 14px 16px 12px; border-bottom: 0.5px solid #e5e5e5; background: #fff; flex-shrink: 0; }
    .nav-back { background: none; border: none; color: #5aacdc; font-size: 22px; cursor: pointer; padding: 0 8px 0 0; line-height: 1; }
    .nav-close { background: none; border: none; color: #5aacdc; font-size: 26px; cursor: pointer; padding: 0; line-height: 1; }
    .nav-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; color: #1a3a5c; }
    .nav-right { font-size: 13px; color: #5aacdc; min-width: 48px; text-align: right; cursor: pointer; }

    .tab-row { display: flex; border-bottom: 1px solid #ddd; flex-shrink: 0; }
    .tab { flex: 1; text-align: center; padding: 13px 0; font-size: 14px; color: #aaa; cursor: pointer; }
    .tab.active { color: #e05a73; border-bottom: 2.5px solid #e05a73; font-weight: 700; }

    .bottom-btn { padding: 12px 16px 20px; background: #fff; flex-shrink: 0; }
    .btn-blue { width: 100%; background: #1a7abf; color: #fff; border: none; border-radius: 6px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-blue:disabled { background: #a8cce0; }
    .btn-outline-blue { width: 100%; background: #fff; color: #1a7abf; border: 2px solid #1a7abf; border-radius: 6px; padding: 14px; font-size: 15px; font-weight: 700; margin-top: 10px; }

    /* Login Screen */
    #screen-login { background: linear-gradient(160deg, #eaf5fc 0%, #fff 60%); justify-content: center; }
    .login-box { width: 100%; padding: 0 28px; }
    .login-title { font-size: 18px; font-weight: 700; color: #1a3a5c; text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 8px; }
    .count-selector { display: flex; align-items: center; justify-content: center; gap: 20px; }
    .cnt-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #1a7abf; background: #fff; color: #1a7abf; font-size: 20px; font-weight: 500; }
    .cnt-val { font-size: 26px; font-weight: 700; color: #1a3a5c; min-width: 36px; text-align: center; }
    .passcode-input { width: 100%; border: 1.5px solid #ccc; border-radius: 8px; padding: 13px 14px; font-size: 16px; }
    .passcode-input.error { border-color: #e05a73; }
    .error-msg { font-size: 12px; color: #e05a73; margin-top: 6px; display: none; }

    /* Components */
    .ticket-check-item { display: flex; align-items: center; gap: 14px; padding: 18px 16px; border-bottom: 0.5px solid #ebebeb; }
    .green-check { width: 34px; height: 34px; background: #4caf50; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .gray-check { width: 34px; height: 34px; background: #ddd; border-radius: 7px; }
    .facility-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 0.5px solid #ebebeb; }
    .facility-thumb { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #e05a73; background: #e8f4fb; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .time-slot { padding: 18px 16px; border-bottom: 0.5px solid #ebebeb; }
    .radio-outer { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #1a7abf; display: flex; align-items: center; justify-content: center; }
    .radio-inner { width: 12px; height: 12px; border-radius: 50%; background: #1a7abf; display: none; }
    
    .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:200; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:12px; margin:0 24px; padding:24px 20px 20px; width:100%; }
    
    @keyframes mfloat { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    .mickey-float { animation: mfloat 1s infinite alternate; }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- Screen 0: Login -->
  <div class="screen active" id="screen-login">
    <div class="login-box">
      <div class="login-title">エントリー受付</div>
      <div class="login-sub">人数・年齢区分を選択して<br>パスコードを入力してください</div>
      <div class="form-group">
        <div class="form-label">大人の人数</div>
        <div class="count-selector">
          <button class="cnt-btn" onclick="changeCount('adult',-1)">－</button>
          <div class="cnt-val" id="adult-count">1</div>
          <button class="cnt-btn" onclick="changeCount('adult',1)">＋</button>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">パスコード</div>
        <input class="passcode-input" id="passcode-input" type="text" placeholder="パスコード" oninput="onPasscodeInput()">
        <div class="error-msg" id="passcode-error">パスコードが正しくありません</div>
      </div>
      <button class="btn-blue" onclick="tryLogin()">次へ</button>
    </div>
  </div>

  <!-- 他のスクリーンも同様の構造で配置... -->
  <!-- (略: 省略しますが、構造は元のコード通りで動作します) -->
</div>

<script>
  // JavaScriptのロジックは以前のものを維持
  var adultCount = 1, childCount = 0;
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function changeCount(type, delta) {
    if (type === 'adult') { adultCount = Math.max(0, adultCount + delta); document.getElementById('adult-count').textContent = adultCount; }
  }
  function tryLogin() {
    var code = document.getElementById('passcode-input').value.trim();
    if (code !== 'WWCM2026') {
      document.getElementById('passcode-input').classList.add('error');
      document.getElementById('passcode-error').style.display = 'block';
      return;
    }
    goTo('screen-ticket');
  }
</script>
</body>
